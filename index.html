<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Work in Progress</title>
  <style>
    :root{
      --bg:#0b0b0b;
      --overlay: rgba(255,255,255,0.06);
      --accent: #ffffff;
    }
    html,body{height:100%;margin:0;font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg);}
    .overlay{
      position:fixed;inset:0;background:linear-gradient(180deg,var(--overlay),rgba(255,255,255,0.02));
      display:grid;place-items:center;
    }
    .card{
      padding:48px 72px;border-radius:16px;background:rgba(0,0,0,0.45);backdrop-filter: blur(6px);
      box-shadow: 0 10px 30px rgba(2,6,23,0.6); text-align:center;
    }
    h1{color:var(--accent);font-size:28px;font-weight:600;margin:0 0 8px;}
    p{color:rgba(255,255,255,0.66);margin:0;font-size:13px;}
  </style>
</head>
<body>
  <div class="overlay">
    <div class="card" role="main" aria-live="polite">
      <h1>Work in Progress.</h1>
      <p>We're building something great — check back soon.</p>
    </div>
  </div>
</body>
</html>
